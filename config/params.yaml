# ============================================================================
# params.yaml
# ----------------------------------------------------------------------------
# Hyperparameters for every regression model trained in the pipeline.
# Editing values here changes model behaviour without touching any code.
# ============================================================================

base:
  random_state: 42
  target_column: track_popularity
  cv_folds: 5

LinearRegression:
  fit_intercept: true

RandomForestRegressor:
  n_estimators: 300
  max_depth: 14
  min_samples_split: 4
  min_samples_leaf: 2
  n_jobs: -1
  random_state: 42

GradientBoostingRegressor:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: 4
  subsample: 0.9
  random_state: 42

XGBRegressor:
  n_estimators: 400
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  tree_method: hist

CatBoostRegressor:
  iterations: 500
  learning_rate: 0.05
  depth: 6
  l2_leaf_reg: 3
  random_seed: 42
  verbose: false

LGBMRegressor:
  n_estimators: 400
  learning_rate: 0.05
  max_depth: -1
  num_leaves: 31
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  n_jobs: -1
  verbosity: -1
