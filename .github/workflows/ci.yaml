name: CI - Spotify Track Popularity Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-lint-train:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src --max-line-length=120 --statistics --count

      - name: Check formatting with black
        run: |
          black --check src

      - name: Run unit tests
        run: |
          pytest tests/ -v || echo "No tests directory found - skipping"

      - name: Execute training pipeline
        run: |
          python main.py

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: artifacts/model/best_model.joblib

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: artifacts/metrics/
