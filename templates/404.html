{% extends "base.html" %}
{% block title %}Page not found{% endblock %}

{% block content %}
<div class="empty-state fade-up">
  <div class="icon-bars">
    <span style="height:20%"></span><span style="height:50%"></span><span style="height:30%"></span>
    <span style="height:65%"></span><span style="height:35%"></span>
  </div>
  <h2>404 &middot; Track not found</h2>
  <p>The page you're looking for doesn't exist.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top:12px;">Back to dashboard</a>
</div>
{% endblock %}
