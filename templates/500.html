{% extends "base.html" %}
{% block title %}Something went wrong{% endblock %}

{% block content %}
<div class="empty-state fade-up">
  <div class="icon-bars">
    <span style="height:60%"></span><span style="height:20%"></span><span style="height:75%"></span>
    <span style="height:25%"></span><span style="height:45%"></span>
  </div>
  <h2>500 &middot; Something dropped out of sync</h2>
  <p>An unexpected error occurred while processing your request. Please try again.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top:12px;">Back to dashboard</a>
</div>
{% endblock %}
